name: rtm-miner
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  - python=3.12
  - pip
  - jupyterlab>=4.2
  - ipykernel>=6.29
  - matplotlib>=3.9
  - plotly>=6.0

  # Core BAM/CRAM and interval tooling
  - samtools>=1.20
  - bcftools>=1.20
  - bedtools>=2.31
  - htslib>=1.20

  # Fast sequence alignment for remapping candidate reads
  - minimap2>=2.28
  - spades>=4.0
  - bwa-mem2>=2.2
  - bwa>=0.7.18

  # Utilities for large-file workflows
  - git
  - pigz
  - pbzip2
  - parallel
  - tabix
  - ripgrep
  - ucsc-bigwigtobedgraph
  - ucsc-bigbedtobed
  - ucsc-liftover

  # Python data and genomics stack
  - pysam>=0.22
  - pyfaidx>=0.8
  - biopython>=1.84
  - pandas>=2.2
  - pyarrow>=16
  - numpy>=1.26
  - h5py>=3.11
  - click>=8.1
  - pyyaml>=6.0
  - intervaltree>=3.1
  - rich>=13.7

  # Optional direct AWS reads (useful for dev/testing flows)
  - s3fs>=2024.6.0

  # IGV batch snapshots for gold-variant review plots (needs Java 21 + system Xvfb on headless Linux)
  - igv>=2.19
  - openjdk>=21
  - glib
  - glib-tools

  - pip:
      - typer>=0.12
